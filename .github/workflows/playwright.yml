name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app-tests:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env file
        run: |
          echo "TEST_EMAIL=${{ secrets.TEST_EMAIL }}" >> .env
          echo "TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}" >> .env

      - name: List tests that will run
        run: npx playwright test tests/BlogIndexPaginationSearch.spec.ts tests/CreateAccount.spec.ts tests/CreatePost.spec.ts tests/HomepageLandingFlow.spec.ts tests/LandingtoblogSingleArticle.spec.ts tests/PostLoginHomepage.spec.ts tests/PostLoginSinglePostView.spec.ts tests/Questionnaire.spec.ts tests/SingleTopicView.spec.ts tests/UserProfileView.spec.ts tests/loginflow.spec.ts tests/preloginsinglepost.spec.ts --project=chromium --list

      - name: Run Playwright tests
        run: npx playwright test tests/BlogIndexPaginationSearch.spec.ts tests/CreateAccount.spec.ts tests/CreatePost.spec.ts tests/HomepageLandingFlow.spec.ts tests/LandingtoblogSingleArticle.spec.ts tests/PostLoginHomepage.spec.ts tests/PostLoginSinglePostView.spec.ts tests/Questionnaire.spec.ts tests/SingleTopicView.spec.ts tests/UserProfileView.spec.ts tests/loginflow.spec.ts tests/preloginsinglepost.spec.ts --project=chromium

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
